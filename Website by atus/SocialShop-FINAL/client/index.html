<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>

<style>
/* ── Compose post box ── */
.compose-box {
  margin: 0 16px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.compose-row {
  display: flex; align-items: center; gap: 10px; padding: 12px 14px;
}
.compose-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--grad); flex-shrink: 0;
  object-fit: cover;
}
.compose-input {
  flex: 1; background: var(--surface-strong); border: 1px solid var(--border);
  border-radius: 999px; padding: 10px 16px; font-size: 14px;
  color: var(--text); font-family: var(--font-body); outline: none;
  transition: border-color .2s; cursor: text;
}
.compose-input:focus { border-color: var(--primary); }
.compose-input::placeholder { color: var(--text-faint); }
.compose-actions {
  display: flex; gap: 2px; padding: 6px 14px 12px;
  border-top: 1px solid var(--border);
}
.compose-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 10px; border-radius: 10px; font-size: 12px; font-weight: 500;
  color: var(--text-dim); background: none; border: none; cursor: pointer;
  transition: background .15s; flex: 1; justify-content: center;
}
.compose-btn:hover { background: var(--surface-strong); }
.compose-btn svg { width: 18px; height: 18px; }
.post-submit-btn {
  background: var(--grad); color: #fff; border: none;
  padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: opacity .2s, transform .15s;
}
.post-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.post-submit-btn:active { transform: scale(0.96); }
.compose-textarea {
  width: 100%; background: none; border: none; outline: none;
  color: var(--text); font-size: 15px; font-family: var(--font-body);
  resize: none; padding: 0 14px 8px; line-height: 1.5; min-height: 60px;
}
.compose-textarea::placeholder { color: var(--text-faint); }
.compose-expanded { display: none; padding: 8px 14px 0; }
.compose-box.open .compose-expanded { display: block; }
.compose-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px 12px;
}
.char-counter { font-size: 12px; color: var(--text-faint); font-family: var(--font-mono); }
.char-counter.warn { color: var(--warn); }
.char-counter.danger { color: #FF6B6B; }
</style>
</head>

<script>
// ── Compose post ──
function openCompose() {
  document.getElementById('composeBox').classList.add('open');
  document.getElementById('composeInput').focus();
}

function updateCharCount(textarea) {
  const len = textarea.value.length;
  const counter = document.getElementById('charCounter');
  const submitBtn = document.getElementById('postSubmitBtn');
  counter.textContent = `${len} / 2000`;
  counter.className = 'char-counter' + (len > 1800 ? ' danger' : len > 1500 ? ' warn' : '');
  submitBtn.disabled = len === 0;
  // Auto resize
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
}

let selectedImages = [];
function handleImageSelect(input) {
  selectedImages = Array.from(input.files);
  if (selectedImages.length) {
    toast(`Đã chọn ${selectedImages.length} ảnh`, 'success');
    openCompose();
  }
}

async function submitPost() {
  const content = document.getElementById('composeInput').value.trim();
  const btn = document.getElementById('postSubmitBtn');
  if (!content && selectedImages.length === 0) return;
  btn.disabled = true;
  btn.textContent = 'Đang đăng...';
  try {
    // Upload images first if any
    let imageUrls = [];
    if (selectedImages.length > 0 && typeof uploadImages === 'function') {
      imageUrls = await uploadImages(selectedImages);
    }
    const ok = await Feed.createPost(content, imageUrls);
    if (ok) {
      document.getElementById('composeInput').value = '';
      document.getElementById('composeInput').style.height = 'auto';
      document.getElementById('charCounter').textContent = '0 / 2000';
      selectedImages = [];
      document.getElementById('composeBox').classList.remove('open');
    }
  } finally {
    btn.disabled = false;
    btn.textContent = 'Đăng';
  }
}

// ── Update avatar in compose ──
window.addEventListener('DOMContentLoaded', () => {
  const session = getSession();
  if (session?.user?.avatar) {
    const av = document.getElementById('composeAvatar');
    av.src = session.user.avatar;
    av.style.display = 'block';
  }
});
</script>
